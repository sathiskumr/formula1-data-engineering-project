resources:
  jobs:
    job_formula1_incremental_batch_orchestration:
      name: job_formula1_incremental_batch_orchestration
      tasks:
        - task_key: 01_Identify_Next_Batch
          notebook_task:
            notebook_path: /Workspace/Users/skr03@outlook.com/formula1-data-engineering-project/formula1-project/06-orchestration/01.Identify
              Next Batch
            source: WORKSPACE
          job_cluster_key: batch_orchestration
        - task_key: is_There_A_Batch_To_Process
          depends_on:
            - task_key: 01_Identify_Next_Batch
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.01_Identify_Next_Batch.values.has_batch}}"
            right: "true"
        - task_key: 02_Create_New_Batch
          depends_on:
            - task_key: is_There_A_Batch_To_Process
              outcome: "true"
          notebook_task:
            notebook_path: /Workspace/Users/skr03@outlook.com/formula1-data-engineering-project/formula1-project/06-orchestration/02.Create
              New Batch
            base_parameters:
              p_batch_id: "{{tasks.01_Identify_Next_Batch.values.p_batch_id}}"
            source: WORKSPACE
          job_cluster_key: batch_orchestration
        - task_key: job_formula1_lakehouse_incr_refresh
          depends_on:
            - task_key: 02_Create_New_Batch
          run_job_task:
            job_id: 304554820470516
            job_parameters:
              p_batch_id: "{{tasks.01_Identify_Next_Batch.values.p_batch_id}}"
        - task_key: 03_Complete_Batch
          depends_on:
            - task_key: job_formula1_lakehouse_incr_refresh
          notebook_task:
            notebook_path: /Workspace/Users/skr03@outlook.com/formula1-data-engineering-project/formula1-project/06-orchestration/03.Complete
              Batch
            base_parameters:
              p_batch_id: "{{tasks.01_Identify_Next_Batch.values.p_batch_id}}"
            source: WORKSPACE
          job_cluster_key: batch_orchestration
      job_clusters:
        - job_cluster_key: batch_orchestration
          new_cluster:
            cluster_name: ""
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            azure_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: -1
            node_type_id: Standard_F4
            driver_node_type_id: Standard_F4
            custom_tags:
              ResourceClass: SingleNode
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      queue:
        enabled: true
